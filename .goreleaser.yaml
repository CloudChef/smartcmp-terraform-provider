version: 2

project_name: smartcmp-terraform-provider

builds:
  - id: smartcmp
    main: ./main.go
    binary: terraform-provider-smartcmp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

release:
  github:
    owner: CloudChef
    name: smartcmp-terraform-provider

